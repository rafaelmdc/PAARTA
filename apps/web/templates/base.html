{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}HomoRepeat{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand-lockup">
          <a class="brand" href="{% url 'core:home' %}">HomoRepeat</a>
          <p class="brand-copy">Pipeline-backed homorepeat browsing and analysis.</p>
        </div>
        <nav class="site-nav" aria-label="Primary">
          <a href="{% url 'core:home' %}">Home</a>
          <a href="{% url 'browser:home' %}">Browser</a>
          <a href="{% url 'imports:home' %}">Imports</a>
          <a href="{% url 'admin:index' %}">Admin</a>
        </nav>
      </header>

      <main class="site-main">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
